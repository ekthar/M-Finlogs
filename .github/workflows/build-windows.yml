name: Build Windows Native

on:
  push:
    branches:
      - ui/aurora-shadcn-motion-revamp
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('native/vcpkg.json') }}

      - name: Setup vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "${{ runner.temp }}\vcpkg"
          & "${{ runner.temp }}\vcpkg\bootstrap-vcpkg.bat"

      - name: Set VCPKG_ROOT
        shell: pwsh
        run: echo "VCPKG_ROOT=${{ runner.temp }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.*"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtcharts qthttpserver

      - name: Configure CMake
        run: cmake -S native -B native/build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build native/build --config Release --parallel

      - name: Deploy Qt dependencies
        run: windeployqt native/build/Release/mfinlogs-native.exe --qmldir native/qml

      - name: Run qmllint (syntax check)
        run: qmllint native/qml/*.qml native/qml/pages/*.qml
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-native-windows
          path: native/build/Release/
