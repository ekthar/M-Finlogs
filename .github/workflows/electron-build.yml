name: Electron App Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build Electron Installer (Windows)
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend.exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --name backend `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import uvicorn.lifespan.off `
            --hidden-import fastapi `
            --hidden-import pydantic `
            --hidden-import multipart `
            --hidden-import pandas `
            --hidden-import openpyxl `
            backend.py

      - name: Verify backend.exe exists
        run: |
          if (-not (Test-Path "dist\backend.exe")) {
            Write-Error "backend.exe not found after PyInstaller build"
            exit 1
          }
          Write-Host "backend.exe size: $((Get-Item 'dist\backend.exe').Length / 1MB) MB"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: |
          Write-Host "=== Build output ==="
          Get-ChildItem -Path "dist" -Recurse -Include "*.exe","*.msi","*.zip","*.yml" | ForEach-Object {
            Write-Host "$($_.FullName) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: M-Finlogs-Installer
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: M-Finlogs-Portable
          path: |
            dist/*.zip
            dist/win-unpacked/**
          if-no-files-found: warn

  # Auto-create GitHub Release when a version tag is pushed
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: M-Finlogs-Installer
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
