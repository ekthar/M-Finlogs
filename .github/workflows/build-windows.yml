name: Native Qt Smoke Build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-2022

    env:
      QT_ROOT: C:\Qt\Qt\6.8.3\msvc2022_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts qthttpserver
          dir: C:\Qt

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S native -B native/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        run: cmake --build native/build --config Release --parallel

      - name: Deploy Qt dependencies
        run: windeployqt native/build/Release/mfinlogs-native.exe --qmldir native/qml

      - name: Run qmllint (syntax check)
        run: |
          Get-ChildItem native\qml -Filter *.qml -File | ForEach-Object { qmllint $_.FullName }
          Get-ChildItem native\qml\pages -Filter *.qml -File | ForEach-Object { qmllint $_.FullName }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-native-windows
          path: native/build/Release/
