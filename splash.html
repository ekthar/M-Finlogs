<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting...</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #f3f7ff;
            --muted: #c4cee0;
            --violet: #7267f6;
        }

        body {
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            background: transparent;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
        }

        .splash-stage {
            position: relative;
            width: 500px;
            height: 300px;
            padding: 14px 16px 14px;
            box-sizing: border-box;
            display: grid;
            place-items: center;
            isolation: isolate;
        }

        .aura {
            position: absolute;
            width: 420px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle at 50% 50%, rgba(61, 120, 201, 0.42), rgba(10, 20, 35, 0.05) 62%, transparent 75%);
            filter: blur(8px);
            z-index: 1;
            animation: auraPulse 4.8s ease-in-out infinite;
        }

        .stack {
            position: relative;
            width: 308px;
            height: 178px;
            display: grid;
            place-items: center;
            z-index: 3;
            transform: translateY(-30px);
        }

        .tile {
            position: absolute;
            border-radius: 20px;
            box-shadow: 0 18px 36px rgba(4, 10, 23, 0.42);
            border: 2px solid rgba(255, 255, 255, 0.35);
            opacity: 0;
        }

        .tile.back-left {
            width: 98px;
            height: 122px;
            background: linear-gradient(160deg, #f8bd53, #e58f1f);
            transform: translate(-60px, -20px) rotate(-15deg) scale(0.88);
            z-index: 2;
            animation: stack-in-left 900ms cubic-bezier(0.22, 1, 0.36, 1) 450ms forwards;
        }

        .tile.back-right {
            width: 96px;
            height: 118px;
            background: linear-gradient(160deg, #7a74ff, #6156e9);
            transform: translate(66px, 36px) rotate(12deg) scale(0.88);
            z-index: 2;
            animation: stack-in-right 900ms cubic-bezier(0.22, 1, 0.36, 1) 950ms forwards;
        }

        .tile.mid {
            width: 110px;
            height: 136px;
            background: linear-gradient(160deg, #63ddcf, #36a6da);
            transform: translate(10px, 0) rotate(7deg) scale(0.9);
            z-index: 3;
            animation: stack-in-mid 980ms cubic-bezier(0.22, 1, 0.36, 1) 700ms forwards;
        }

        .core {
            position: absolute;
            width: 114px;
            height: 142px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            background: linear-gradient(165deg, #fdfdfd, #e7eef9);
            box-shadow: 0 24px 40px rgba(2, 8, 20, 0.48);
            border: 2px solid rgba(255, 255, 255, 0.8);
            z-index: 4;
            animation: core-in 900ms cubic-bezier(0.22, 1, 0.36, 1) 80ms both;
        }

        .logo-wrap {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            display: grid;
            place-items: center;
            background: linear-gradient(165deg, #66e2d4, #55b5ea);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.4);
        }

        .splash-logo {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.25));
        }

        .chip {
            position: absolute;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(4, 10, 23, 0.35);
            opacity: 0;
            z-index: 5;
        }

        .chip.rs {
            width: 36px;
            height: 36px;
            border-radius: 13px;
            background: linear-gradient(160deg, var(--violet), #8f6cff);
            right: 58px;
            top: 50px;
            animation: pop-in 620ms cubic-bezier(0.22, 1, 0.36, 1) 1550ms forwards;
        }

        .chip.pie {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            left: 58px;
            bottom: 40px;
            background:
                conic-gradient(#f4b448 0 42%, #56d6c6 42% 76%, #ff7e96 76% 100%);
            animation: pop-in 620ms cubic-bezier(0.22, 1, 0.36, 1) 1750ms forwards;
        }

        .brand {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            text-align: center;
            z-index: 6;
            animation: fade-up 700ms ease-out 2050ms both;
            width: 100%;
            padding: 0 12px;
            box-sizing: border-box;
        }

        .brand h1 {
            margin: 0;
            font-size: 44px;
            line-height: 0.9;
            letter-spacing: -0.045em;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.32);
        }

        .brand p {
            margin: 10px 0 0 0;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .loading {
            position: absolute;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #dbe7fb;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 6;
            animation: fade-up 700ms ease-out 2250ms both;
            width: 100%;
            justify-content: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dbe7fb;
            opacity: 0.2;
            animation: blink 1.8s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.24s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.48s;
        }

        @keyframes core-in {
            from {
                transform: translateY(8px) scale(0.72);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes stack-in-left {
            from {
                opacity: 0;
                transform: translate(-82px, -34px) rotate(-24deg) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translate(-60px, -20px) rotate(-15deg) scale(1);
            }
        }

        @keyframes stack-in-mid {
            from {
                opacity: 0;
                transform: translate(18px, 8px) rotate(15deg) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translate(10px, 0) rotate(7deg) scale(1);
            }
        }

        @keyframes stack-in-right {
            from {
                opacity: 0;
                transform: translate(90px, 60px) rotate(20deg) scale(0.78);
            }

            to {
                opacity: 1;
                transform: translate(66px, 36px) rotate(12deg) scale(1);
            }
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.68);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes auraPulse {
            0%, 100% {
                transform: scale(0.96);
                opacity: 0.45;
            }
            50% {
                transform: scale(1.03);
                opacity: 0.6;
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes blink {
            0%, 100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        @media (max-width: 540px) {
            .splash-stage {
                width: 96vw;
                height: 92vh;
            }

            .brand {
                bottom: 10%;
            }

            .loading {
                bottom: 4%;
            }
        }
    </style>
</head>

<body>
    <div class="splash-stage">
        <div class="aura"></div>

        <div class="stack">
            <div class="tile back-left"></div>
            <div class="tile back-right"></div>
            <div class="tile mid"></div>
            <div class="core">
                <div class="logo-wrap">
                    <img src="assets/finlogs.svg" class="splash-logo" alt="Finlogs Logo">
                </div>
            </div>
            <div class="chip rs">₹</div>
            <div class="chip pie"></div>
        </div>

        <div class="brand">
            <h1>FINLOGS</h1>
            <p>Financial Workspace • Loading Modules....</p>
        </div>

        <div class="loading">
            <span>Starting</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
</body>

</html>
