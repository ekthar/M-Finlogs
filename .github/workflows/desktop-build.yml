name: Desktop App Build & Release

on:
  push:
    branches: [main, nextjs, feature/desktop-winforms-app]
    paths:
      - 'MFinlogs.Desktop/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main, nextjs]
    paths:
      - 'MFinlogs.Desktop/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release with installer'
        required: false
        default: 'false'
        type: boolean
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: ''
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'MFinlogs.Desktop/MFinlogs.Desktop/MFinlogs.Desktop.csproj'
  SOLUTION_PATH: 'MFinlogs.Desktop/MFinlogs.Desktop.sln'

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [win-x64, win-arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/MFinlogs.Desktop.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} `
            --configuration ${{ matrix.configuration }} `
            --no-restore `
            -p:Platform="Any CPU"

      - name: Publish self-contained executable
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration ${{ matrix.configuration }} `
            --runtime ${{ matrix.platform }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --output ./publish/${{ matrix.platform }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MFinlogs-Desktop-${{ matrix.platform }}
          path: ./publish/${{ matrix.platform }}/
          retention-days: 30

  create-installer:
    name: Create Installer (x64)
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download x64 build artifact
        uses: actions/download-artifact@v4
        with:
          name: MFinlogs-Desktop-win-x64
          path: ./publish

      - name: Download WebView2 Bootstrapper
        run: |
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "MFinlogs.Desktop/Installer/MicrosoftEdgeWebview2Setup.exe"

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "1.0.${{ github.run_number }}"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Using version: $version"

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          # Update version in .iss file
          $issContent = Get-Content "MFinlogs.Desktop/Installer/setup.iss" -Raw
          $issContent = $issContent -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
          $issContent | Set-Content "MFinlogs.Desktop/Installer/setup.iss"

          # Run Inno Setup compiler
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "MFinlogs.Desktop/Installer/setup.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFinlogs-Installer-${{ steps.version.outputs.VERSION }}
          path: ./MFinlogs.Desktop/output/*.exe
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build, create-installer]
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package artifacts for release
        run: |
          cd artifacts

          # Zip the x64 portable build
          cd MFinlogs-Desktop-win-x64
          zip -r ../MFinlogs-Desktop-${{ steps.version.outputs.VERSION }}-win-x64-portable.zip .
          cd ..

          # Zip the ARM64 portable build
          cd MFinlogs-Desktop-win-arm64
          zip -r ../MFinlogs-Desktop-${{ steps.version.outputs.VERSION }}-win-arm64-portable.zip .
          cd ..

          # Copy installer
          cp MFinlogs-Installer-${{ steps.version.outputs.VERSION }}/*.exe \
            ./MFinlogs-Setup-${{ steps.version.outputs.VERSION }}.exe 2>/dev/null || true

          ls -la *.zip *.exe 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: M-Finlogs Desktop v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## M-Finlogs Desktop v${{ steps.version.outputs.VERSION }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `MFinlogs-Setup-*.exe` | Windows Installer (recommended) |
            | `*-win-x64-portable.zip` | Portable build for x64 Windows |
            | `*-win-arm64-portable.zip` | Portable build for ARM64 Windows |

            ### Modes Supported
            - **Online**: Cloud UI + Cloud DB (Neon PostgreSQL)
            - **Offline**: Local UI + Local DB (SQLite)
            - **Hybrid**: Cloud UI + Local DB (best of both)

            ### Requirements
            - Windows 10 version 1809 or later (64-bit)
            - WebView2 Runtime (auto-installed by the installer)
          files: |
            artifacts/MFinlogs-Desktop-${{ steps.version.outputs.VERSION }}-win-x64-portable.zip
            artifacts/MFinlogs-Desktop-${{ steps.version.outputs.VERSION }}-win-arm64-portable.zip
            artifacts/MFinlogs-Setup-${{ steps.version.outputs.VERSION }}.exe
