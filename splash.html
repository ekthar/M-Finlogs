<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFINLOGS | Initializing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef4ff;
            --ink: #0f2942;
            --accent: #0ea5e9;
            --grid: rgba(15, 41, 66, 0.12);
            --border: rgba(15, 41, 66, 0.22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #edf4ff 55%, #e5eefc 100%);
            color: var(--ink);
            -webkit-app-region: drag;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 38px 38px;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .line-x, .line-y {
            position: absolute;
            background: var(--grid);
        }

        .line-x { left: 0; width: 100vw; height: 1px; }
        .line-y { top: 0; height: 100vh; width: 1px; }

        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .sheet {
            width: min(460px, 96vw);
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--border);
            padding: 26px 24px;
            box-shadow: 12px 12px 0 rgba(15, 41, 66, 0.12);
            backdrop-filter: blur(8px);
            position: relative;
            text-align: center;
        }

        .sheet::before, .sheet::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 34px;
        }

        .sheet::before {
            top: -8px;
            left: -8px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
        }

        .sheet::after {
            bottom: -8px;
            right: -8px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            letter-spacing: -1px;
            line-height: 0.92;
            font-weight: 900;
            margin-bottom: 8px;
            color: transparent;
            -webkit-text-stroke: 1px var(--ink);
        }

        h1 span {
            display: block;
            color: var(--ink);
            -webkit-text-stroke: 0;
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 1.3px;
            text-transform: uppercase;
            color: #234162;
            margin-top: 10px;
            min-height: 1.4em;
        }

        .loader {
            margin: 22px auto 0;
            width: min(280px, 70vw);
            height: 2px;
            background: rgba(15, 41, 66, 0.16);
            overflow: hidden;
            position: relative;
        }

        .loader > div {
            position: absolute;
            height: 100%;
            width: 38%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: sweep 1.8s infinite ease-in-out;
        }

        .note {
            margin-top: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            opacity: 0.65;
            color: #234162;
            letter-spacing: 1px;
        }

        @keyframes sweep {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="line-x" style="top:10%;"></div>
    <div class="line-x" style="bottom:10%;"></div>
    <div class="line-y" style="left:5%;"></div>
    <div class="line-y" style="right:5%;"></div>

    <div class="wrap">
        <main class="sheet">
            <img src="assets/finlogs.svg" alt="MUNNA icon" class="logo">
            <h1>MFIN<span>LOGS</span></h1>
            <div id="stream" class="status">INITIALIZING SYSTEM CORE...</div>
            <div class="loader"><div></div></div>
            <div class="note">BUILD_0.1.3-GAMMA.1 // SQL_CORE</div>
        </main>
    </div>

    <script>
        const streamText = document.getElementById('stream');
        const phases = [
            'INITIALIZING SYSTEM CORE...',
            'MOUNTING LEDGER MODULE...',
            'VERIFYING DATABASE CHANNEL...',
            'MFINLOGS READY.'
        ];
        let current = 0;

        setInterval(() => {
            if (current < phases.length - 1) {
                current += 1;
                streamText.style.opacity = 0;
                setTimeout(() => {
                    streamText.textContent = phases[current];
                    streamText.style.opacity = 1;
                }, 180);
            }
        }, 1200);
    </script>
</body>
</html>
