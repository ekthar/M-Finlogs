name: Native Windows Build Fresh

on:
  push:
    branches:
      - C
      - ui/aurora-shadcn-motion-revamp
  pull_request:
    branches:
      - C
      - main
      - ui/aurora-shadcn-motion-revamp
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Qt native app
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    env:
      QT_ROOT: C:\Qt\Qt\6.8.3\msvc2022_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts qthttpserver qtwebsockets
          dir: C:\Qt
          setup-python: false

      - name: Setup VS 2022 environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          cmake `
            -S native `
            -B native\build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        run: cmake --build native\build --config Release

      - name: Run tests
        run: |
          ctest --test-dir native\build --build-config Release --output-on-failure --timeout 120
          if ($LASTEXITCODE -ne 0) {
            Write-Host ""
            Write-Host "=== TEST FAILURE DIAGNOSTICS ===" -ForegroundColor Red
            Write-Host "One or more unit/integration tests failed." -ForegroundColor Red
            Write-Host "Review the output above for assertion failures." -ForegroundColor Yellow
            Write-Host "To reproduce locally:" -ForegroundColor Yellow
            Write-Host "  cmake --build native\build --config Release" -ForegroundColor Cyan
            Write-Host "  ctest --test-dir native\build --build-config Release -V" -ForegroundColor Cyan
            exit 1
          }
          Write-Host "All tests passed" -ForegroundColor Green

      - name: Validate QML
        run: |
          $exitCode = 0
          $qmlFiles = @()
          $qmlFiles += Get-ChildItem native\qml -Filter *.qml -File -Recurse
          Write-Host "Validating $($qmlFiles.Count) QML files..." -ForegroundColor Cyan
          foreach ($file in $qmlFiles) {
            $output = qmllint $file.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: $($file.FullName)" -ForegroundColor Red
              Write-Host $output -ForegroundColor Yellow
              $exitCode = 1
            }
          }
          if ($exitCode -ne 0) {
            Write-Host ""
            Write-Host "=== QML VALIDATION FAILED ===" -ForegroundColor Red
            Write-Host "Fix the QML errors above. Run locally with:" -ForegroundColor Yellow
            Write-Host "  qmllint native/qml/**/*.qml" -ForegroundColor Cyan
            exit 1
          }
          Write-Host "All $($qmlFiles.Count) QML files passed validation" -ForegroundColor Green

      - name: Check whitespace
        continue-on-error: true
        run: |
          git diff --check HEAD~1 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Whitespace issues detected. Run 'git diff --check' locally." -ForegroundColor Yellow
          }

      - name: Package native executable
        run: |
          $packageDir = "native\build\package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageDir\fonts" | Out-Null
          Copy-Item -LiteralPath "native\build\Release\mfinlogs-native.exe" -Destination $packageDir -Force
          Copy-Item -LiteralPath "db_config.json" -Destination $packageDir -Force
          Copy-Item -Path "fonts\SpaceMono-*.ttf" -Destination "$packageDir\fonts" -Force
          Copy-Item -Path "fonts\InterTight-*.ttf" -Destination "$packageDir\fonts" -Force
          windeployqt --release --qmldir native\qml --compiler-runtime "$packageDir\mfinlogs-native.exe"

          $offscreenSrc = Join-Path $env:QT_ROOT "plugins\platforms\qoffscreen.dll"
          $offscreenDest = Join-Path $packageDir "platforms"
          if (Test-Path $offscreenSrc) {
            Copy-Item -LiteralPath $offscreenSrc -Destination $offscreenDest -Force
            Write-Host "Copied qoffscreen.dll for headless CI verification" -ForegroundColor Green
          } else {
            Write-Host "WARNING: qoffscreen.dll not found at $offscreenSrc" -ForegroundColor Yellow
          }

      - name: Verify package contents
        run: |
          $packageDir = "native\build\package"
          $missing = @()

          # Critical executables and DLLs
          $requiredFiles = @(
            "mfinlogs-native.exe",
            "Qt6Core.dll",
            "Qt6Gui.dll",
            "Qt6Quick.dll",
            "Qt6Qml.dll",
            "Qt6QuickControls2.dll",
            "Qt6Widgets.dll",
            "Qt6Sql.dll",
            "Qt6Network.dll",
            "platforms\qwindows.dll",
            "platforms\qoffscreen.dll",
            "fonts\InterTight-Regular.ttf",
            "fonts\SpaceMono-Regular.ttf",
            "db_config.json"
          )

          foreach ($file in $requiredFiles) {
            $fullPath = Join-Path $packageDir $file
            if (-not (Test-Path $fullPath)) {
              $missing += $file
              Write-Host "MISSING: $file" -ForegroundColor Red
            } else {
              Write-Host "OK: $file" -ForegroundColor Green
            }
          }

          # At least one SQL driver plugin must be present
          $sqlDrivers = @("sqldrivers\qsqlodbc.dll", "sqldrivers\qsqlite.dll")
          $hasSqlDriver = $false
          foreach ($driver in $sqlDrivers) {
            $fullPath = Join-Path $packageDir $driver
            if (Test-Path $fullPath) {
              $hasSqlDriver = $true
              Write-Host "OK: $driver (SQL driver)" -ForegroundColor Green
            }
          }
          if (-not $hasSqlDriver) {
            $missing += "sqldrivers\qsqlodbc.dll OR sqldrivers\qsqlite.dll"
            Write-Host "MISSING: No SQL driver plugin found (need qsqlodbc.dll or qsqlite.dll)" -ForegroundColor Red
          }

          # Check for QML modules deployed by windeployqt
          $qmlDir = Join-Path $packageDir "qml"
          if (Test-Path $qmlDir) {
            Write-Host "OK: QML modules directory exists" -ForegroundColor Green
          } else {
            Write-Host "WARNING: qml/ directory not found - QML modules may be compiled into binary" -ForegroundColor Yellow
          }

          # Summary
          if ($missing.Count -gt 0) {
            Write-Host ""
            Write-Host "=== PACKAGING VALIDATION FAILED ===" -ForegroundColor Red
            Write-Host "Missing $($missing.Count) required file(s):" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
            Write-Host ""
            Write-Host "Package contents:" -ForegroundColor Yellow
            Get-ChildItem -Path $packageDir -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName.Replace((Resolve-Path $packageDir).Path, ''))"
            }
            exit 1
          }

          Write-Host ""
          Write-Host "=== All required package files verified ===" -ForegroundColor Green

      - name: Smoke test QML loading
        run: |
          $packageDir = "native\build\package"
          Write-Host "Platform plugins available:" -ForegroundColor Cyan
          Get-ChildItem "$packageDir\platforms" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  - $($_.Name)" }
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:QSG_RHI_BACKEND = "null"
          $proc = Start-Process -FilePath "$packageDir\mfinlogs-native.exe" -ArgumentList "--verify-qml" -PassThru -NoNewWindow -RedirectStandardError "$packageDir\verify-stderr.log" -RedirectStandardOutput "$packageDir\verify-stdout.log"
          if (-not $proc.WaitForExit(30000)) {
            $proc.Kill()
            Write-Error "QML smoke test timed out after 30 seconds"
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "QML verification failed with exit code $($proc.ExitCode)"
            if ($proc.ExitCode -eq -1073741819) {
              Write-Host "Access violation (0xC0000005) detected. See crash-error.log below for the exact address and stack trace." -ForegroundColor Red
            }
            Write-Host "--- stdout ---" -ForegroundColor Yellow
            Get-Content "$packageDir\verify-stdout.log" -ErrorAction SilentlyContinue
            Write-Host "--- stderr ---" -ForegroundColor Yellow
            Get-Content "$packageDir\verify-stderr.log" -ErrorAction SilentlyContinue
            if (Test-Path "$packageDir\startup-error.log") {
              Write-Host "--- startup-error.log ---" -ForegroundColor Yellow
              Get-Content "$packageDir\startup-error.log"
            }
            if (Test-Path "$packageDir\crash-error.log") {
              Write-Host "--- crash-error.log (SEH handler) ---" -ForegroundColor Yellow
              Get-Content "$packageDir\crash-error.log"
            } else {
              Write-Host "No crash-error.log was produced - the SEH filter may not have run." -ForegroundColor Yellow
            }
            exit 1
          }
          Write-Host "QML smoke test passed - all modules load correctly" -ForegroundColor Green

      - name: Upload crash diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-crash-diagnostics
          path: |
            native\build\package\crash-error.log
            native\build\package\startup-error.log
            native\build\package\verify-stdout.log
            native\build\package\verify-stderr.log
          if-no-files-found: ignore

      - name: Build installer
        run: |
          choco install innosetup -y --no-progress
          & native\installer\build_installer.bat
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup installer build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-installer
          path: native\installer\Output\*.exe

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-native-windows
          path: native\build\package\**
