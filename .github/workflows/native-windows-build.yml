name: Native Windows Build Fresh

on:
  push:
    branches:
      - C
  workflow_dispatch: {}

jobs:
  build:
    name: Build Qt native app
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      QT_ROOT: C:\Qt\6.7.3\msvc2019_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 -O C:\Qt --modules qtcharts qthttpserver qtwebsockets qtsvg
          "$env:QT_ROOT\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        run: |
          cmake `
            -S native `
            -B native\build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        run: cmake --build native\build --config Release --target mfinlogs-native

      - name: Package native executable
        run: |
          $packageDir = "native\build\package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageDir\fonts" | Out-Null
          Copy-Item -LiteralPath "native\build\Release\mfinlogs-native.exe" -Destination $packageDir -Force
          Copy-Item -LiteralPath "db_config.json" -Destination $packageDir -Force
          Copy-Item -Path "fonts\SpaceMono-*.ttf" -Destination "$packageDir\fonts" -Force
          Copy-Item -Path "fonts\InterTight-*.ttf" -Destination "$packageDir\fonts" -Force
          windeployqt --release --compiler-runtime "$packageDir\mfinlogs-native.exe"

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-native-windows
          path: native\build\package\**
