name: Native Windows Build Fresh

on:
  push:
    branches:
      - C
      - ui/aurora-shadcn-motion-revamp
  pull_request:
    branches:
      - C
      - main
      - ui/aurora-shadcn-motion-revamp
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Qt native app
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    env:
      QT_ROOT: C:\Qt\Qt\6.8.3\msvc2022_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts qthttpserver qtwebsockets
          dir: C:\Qt
          setup-python: false

      - name: Setup VS 2022 environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          cmake `
            -S native `
            -B native\build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        run: cmake --build native\build --config Release --target mfinlogs-native

      - name: Validate QML
        run: |
          Get-ChildItem native\qml -Filter *.qml -File | ForEach-Object { qmllint $_.FullName }
          Get-ChildItem native\qml\pages -Filter *.qml -File | ForEach-Object { qmllint $_.FullName }

      - name: Package native executable
        run: |
          $packageDir = "native\build\package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageDir\fonts" | Out-Null
          Copy-Item -LiteralPath "native\build\Release\mfinlogs-native.exe" -Destination $packageDir -Force
          Copy-Item -LiteralPath "db_config.json" -Destination $packageDir -Force
          Copy-Item -Path "fonts\SpaceMono-*.ttf" -Destination "$packageDir\fonts" -Force
          Copy-Item -Path "fonts\InterTight-*.ttf" -Destination "$packageDir\fonts" -Force
          windeployqt --release --qmldir native\qml --compiler-runtime "$packageDir\mfinlogs-native.exe"

      - name: Smoke-test deployed QML runtime
        run: |
          # Do not allow the CI installation of Qt to hide missing files in
          # the deploy folder. The executable must resolve plugins and imports
          # relative to its own directory, exactly as it will after install.
          Remove-Item Env:QT_PLUGIN_PATH -ErrorAction SilentlyContinue
          Remove-Item Env:QML2_IMPORT_PATH -ErrorAction SilentlyContinue
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:QT_DEBUG_PLUGINS = "1"
          & "native\build\package\mfinlogs-native.exe" --verify-qml
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $diagnostic = Join-Path $env:LOCALAPPDATA "Ekthar\M-Finlogs\startup-error.log"
            if (Test-Path -LiteralPath $diagnostic) {
              Get-Content -LiteralPath $diagnostic
            }
            throw "The packaged native executable could not create its QML root window."
          }

      - name: Build installer
        run: |
          choco install innosetup -y --no-progress
          native\installer\build_installer.bat

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-installer
          path: native\installer\Output\*.exe

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: mfinlogs-native-windows
          path: native\build\package\**
