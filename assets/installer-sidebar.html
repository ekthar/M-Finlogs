<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 164px;
            height: 314px;
            overflow: hidden;
            background: linear-gradient(135deg, #eef4ff 0%, #dbe8f9 100%);
            position: relative;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
        }
        
        /* Blueprint grid overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(15, 41, 66, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 41, 66, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        
        /* Corner markers */
        .corner-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1.5px solid rgba(14, 165, 233, 0.4);
        }
        
        .corner-marker.tl {
            top: 8px;
            left: 8px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-marker.tr {
            top: 8px;
            right: 8px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-marker.bl {
            bottom: 8px;
            left: 8px;
            border-right: none;
            border-top: none;
        }
        
        .corner-marker.br {
            bottom: 8px;
            right: 8px;
            border-left: none;
            border-top: none;
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .logo-area {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 24px;
        }
        
        .logo-area::before,
        .logo-area::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            border: 1px solid rgba(14, 165, 233, 0.5);
        }
        
        .logo-area::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }
        
        .logo-area::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 900;
            color: #0f2942;
            letter-spacing: -1px;
        }
        
        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: #0f2942;
            margin-bottom: 4px;
            text-align: center;
        }
        
        .version {
            font-size: 9px;
            color: #0ea5e9;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        
        .specs {
            width: 100%;
            margin-top: auto;
        }
        
        .spec-line {
            font-size: 7px;
            color: rgba(15, 41, 66, 0.6);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }
        
        .spec-label {
            text-transform: uppercase;
        }
        
        .spec-value {
            font-weight: 600;
            color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="corner-marker tl"></div>
    <div class="corner-marker tr"></div>
    <div class="corner-marker bl"></div>
    <div class="corner-marker br"></div>
    
    <div class="content">
        <div class="logo-area">
            <div class="logo-text">M</div>
        </div>
        
        <div class="product-name">M-Finlogs</div>
        <div class="version">v0.1.3-γ.2</div>
        
        <div class="specs">
            <div class="spec-line">
                <span class="spec-label">Type:</span>
                <span class="spec-value">Enterprise</span>
            </div>
            <div class="spec-line">
                <span class="spec-label">Arch:</span>
                <span class="spec-value">x64</span>
            </div>
            <div class="spec-line">
                <span class="spec-label">Build:</span>
                <span class="spec-value">Stable</span>
            </div>
            <div class="spec-line">
                <span class="spec-label">Platform:</span>
                <span class="spec-value">Win32</span>
            </div>
        </div>
    </div>
</body>
</html>
